<title>Карманные деньги — Умные деньги</title>

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
background:#111;
color:#fff;
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
overflow:hidden;
}

/* ===== start screen ===== */

.start-screen{
position:fixed;
inset:0;
background:#111;
display:flex;
align-items:center;
justify-content:center;
z-index:999;
transition:1s;
}

.start-card{
padding:45px;
border-radius:25px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
text-align:center;
backdrop-filter:blur(25px);
}

#startBtn{
margin-top:30px;
padding:14px 35px;
border-radius:14px;
border:1px solid rgba(255,255,255,0.2);
background:rgba(255,255,255,0.05);
color:white;
cursor:pointer;
transition:.3s;
}

#startBtn:hover{
background:rgba(255,255,255,0.18);
box-shadow:0 0 20px rgba(255,255,255,0.4);
}

/* ===== top bar ===== */

.top-bar{
margin-top:25px;
width:95%;
max-width:1100px;
padding:18px 25px;
border-radius:20px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
display:flex;
justify-content:space-between;
align-items:center;
backdrop-filter:blur(20px);
}

.timer{
font-weight:600;
}

/* ===== layout ===== */

.game-wrapper{
width:95%;
max-width:1100px;
margin-top:25px;
display:grid;
grid-template-columns:1fr 260px;
gap:25px;
}

/* ===== card ===== */

.card{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.12);
border-radius:25px;
padding:35px;
backdrop-filter:blur(25px);
box-shadow:0 0 35px rgba(255,255,255,0.1);
transition:.4s;
}

.fade-out{
opacity:0;
transform:translateY(-20px);
}

.fade-in{
animation:fadeIn .4s;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(20px)}
to{opacity:1}
}

/* ===== question ===== */

.question{
font-size:1.3rem;
margin-bottom:25px;
}

/* ===== answers ===== */

.answers{
display:flex;
flex-direction:column;
gap:15px;
}

.answer{
padding:14px;
border-radius:14px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.12);
cursor:pointer;
transition:.25s;
}

.answer:hover{
background:rgba(255,255,255,0.09);
}

/* ===== answer animations ===== */

@keyframes correctFlash{
0%{transform:scale(1)}
50%{transform:scale(1.07);box-shadow:0 0 25px rgba(80,255,120,.8)}
100%{transform:scale(1)}
}

@keyframes wrongFlash{
0%{transform:scale(1)}
50%{transform:scale(.95);box-shadow:0 0 25px rgba(255,80,80,.8)}
100%{transform:scale(1)}
}

.correct{
background:rgba(80,255,120,0.25);
border-color:rgba(80,255,120,0.8);
animation:correctFlash .5s;
}

.wrong{
background:rgba(255,80,80,0.25);
border-color:rgba(255,80,80,0.8);
animation:wrongFlash .5s;
}

/* ===== scoreboard ===== */

.scoreboard{
display:flex;
flex-direction:column;
gap:15px;
}

.player{
padding:14px;
border-radius:14px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.12);
display:flex;
justify-content:space-between;
}

.bot{opacity:.85}

/* ===== winner screen ===== */

.winner{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
background:#111;
z-index:1000;
}

</style>
</head>

document.getElementById("qTotal").textContent=QUESTIONS_TOTAL

let shuffled=[...QUESTIONS].sort(()=>Math.random()-0.5)

let current=0

let playerScore=0
let bot1Score=0
let bot2Score=0

/* timer */

let time=45
let timerInterval

function startTimer(){

clearInterval(timerInterval)

time=45
document.getElementById("timer").textContent=time

timerInterval=setInterval(()=>{

time--
document.getElementById("timer").textContent=time

if(time<=0){

clearInterval(timerInterval)

current++
nextQuestion()

}

},1000)

}

/* load question */

function loadQuestion(){

if(current>=QUESTIONS_TOTAL){
endGame()
return
}

document.getElementById("qCurrent").textContent=current+1

const q=shuffled[current]

const card=document.getElementById("card")

card.classList.remove("fade-in")
card.classList.add("fade-out")

setTimeout(()=>{

document.getElementById("question").textContent=q.q

const answersBlock=document.getElementById("answers")
answersBlock.innerHTML=""

q.answers.forEach((text,i)=>{

const div=document.createElement("div")
div.className="answer"
div.textContent=text

div.onclick=()=>selectAnswer(div,i)

answersBlock.appendChild(div)

})

card.classList.remove("fade-out")
card.classList.add("fade-in")

startTimer()

},300)

}

/* answer */

function selectAnswer(el,index){

clearInterval(timerInterval)

const q=shuffled[current]
const answers=document.querySelectorAll(".answer")

answers.forEach(a=>a.onclick=null)

if(index===q.correct){

el.classList.add("correct")
playerScore+=10

correctSound.currentTime=0
correctSound.play()

}else{

el.classList.add("wrong")
answers[q.correct].classList.add("correct")

wrongSound.currentTime=0
wrongSound.play()

}

updateScores()

setTimeout(()=>{

current++
nextQuestion()

},1200)

}

function nextQuestion(){

loadQuestion()

}

/* scores */

function updateScores(){

document.getElementById("playerScore").textContent=playerScore
document.getElementById("bot1Score").textContent=bot1Score
document.getElementById("bot2Score").textContent=bot2Score

}

/* bots */

function botsTurn(){

const q=shuffled[current]

if(!q)return

const r1=Math.floor(Math.random()*3)
const r2=Math.floor(Math.random()*3)

if(r1===q.correct)bot1Score+=10
if(r2===q.correct)bot2Score+=10

updateScores()

}

setInterval(botsTurn,30000)

/* end */

function endGame(){

let winner="Ничья"

if(playerScore>bot1Score && playerScore>bot2Score)
winner="Игрок"

if(bot1Score>playerScore && bot1Score>bot2Score)
winner="Бот Алекс"

if(bot2Score>playerScore && bot2Score>bot1Score)
winner="Бот Маша"

document.body.innerHTML=`

<div class="winner">

<div class="card" style="text-align:center">

<h2>Игра окончена</h2>

<br>

<h3>Победитель: ${winner}</h3>

<br>

<p>Игрок: ${playerScore}</p>
<p>Бот Алекс: ${bot1Score}</p>
<p>Бот Маша: ${bot2Score}</p>

<br>

<p style="opacity:.6">Возврат через 5 секунд...</p>

</div>

</div>

`

setTimeout(()=>{

location.reload()

},5000)

}

/* start */

document.getElementById("startBtn").onclick=()=>{

document.getElementById("startScreen").style.opacity="0"

setTimeout(()=>{
document.getElementById("startScreen").style.display="none"
loadQuestion()
},700)

}
