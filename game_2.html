<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Накопления и цели — Умные деньги</title>

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
background:#111;
color:#fff;
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
overflow:hidden;
}

/* ===== start screen ===== */

.start-screen{
position:fixed;
inset:0;
background:#111;
display:flex;
align-items:center;
justify-content:center;
z-index:999;
transition:1s;
}

.start-card{
padding:45px;
border-radius:25px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
text-align:center;
backdrop-filter:blur(25px);
}

#startBtn{
margin-top:30px;
padding:14px 35px;
border-radius:14px;
border:1px solid rgba(255,255,255,0.2);
background:rgba(255,255,255,0.05);
color:white;
cursor:pointer;
transition:.3s;
}

#startBtn:hover{
background:rgba(255,255,255,0.18);
box-shadow:0 0 20px rgba(255,255,255,0.4);
}

/* ===== top bar ===== */

.top-bar{
margin-top:25px;
width:95%;
max-width:1100px;
padding:18px 25px;
border-radius:20px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
display:flex;
justify-content:space-between;
align-items:center;
backdrop-filter:blur(20px);
}

.timer{
font-weight:600;
}

/* ===== layout ===== */

.game-wrapper{
width:95%;
max-width:1100px;
margin-top:25px;
display:grid;
grid-template-columns:1fr 260px;
gap:25px;
}

/* ===== card ===== */

.card{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.12);
border-radius:25px;
padding:35px;
backdrop-filter:blur(25px);
box-shadow:0 0 35px rgba(255,255,255,0.1);
transition:.4s;
}

.fade-out{
opacity:0;
transform:translateY(-20px);
}

.fade-in{
animation:fadeIn .4s;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(20px)}
to{opacity:1}
}

/* ===== question ===== */

.question{
font-size:1.3rem;
margin-bottom:25px;
}

/* ===== answers ===== */

.answers{
display:flex;
flex-direction:column;
gap:15px;
}

.answer{
padding:14px;
border-radius:14px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.12);
cursor:pointer;
transition:.25s;
}

.answer:hover{
background:rgba(255,255,255,0.09);
}

/* ===== answer animations ===== */

@keyframes correctFlash{
0%{transform:scale(1)}
50%{transform:scale(1.07);box-shadow:0 0 25px rgba(80,255,120,.8)}
100%{transform:scale(1)}
}

@keyframes wrongFlash{
0%{transform:scale(1)}
50%{transform:scale(.95);box-shadow:0 0 25px rgba(255,80,80,.8)}
100%{transform:scale(1)}
}

.correct{
background:rgba(80,255,120,0.25);
border-color:rgba(80,255,120,0.8);
animation:correctFlash .5s;
}

.wrong{
background:rgba(255,80,80,0.25);
border-color:rgba(255,80,80,0.8);
animation:wrongFlash .5s;
}

/* ===== scoreboard ===== */

.scoreboard{
display:flex;
flex-direction:column;
gap:15px;
}

.player{
padding:14px;
border-radius:14px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.12);
display:flex;
justify-content:space-between;
}

.bot{opacity:.85}

/* ===== winner screen ===== */

.winner{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
background:#111;
z-index:1000;
}

</style>
</head>

<body>

<div class="start-screen" id="startScreen">

<div class="start-card">

<h2>Готовы проверить свои финансовые навыки? Игра является сложнее первой</h2>

<button id="startBtn">Готово</button>

</div>

</div>

<div class="top-bar">
<div>Умные деньги</div>
<div>
Вопрос <span id="qCurrent">1</span>/<span id="qTotal"></span>
</div>
<div class="timer">
⏱ <span id="timer">10</span>
</div>
</div>

<div class="game-wrapper">

<div class="card" id="card">

<div class="question" id="question"></div>

<div class="answers" id="answers"></div>

</div>

<div class="scoreboard">

<div class="player">
<span>Игрок</span>
<span id="playerScore">0</span>
</div>

<div class="player bot">
<span>Бот Дима</span>
<span id="bot1Score">0</span>
</div>

<div class="player bot">
<span>Бот Олег</span>
<span id="bot2Score">0</span>
</div>

</div>

</div>

<script>

correct:1},

{q:"В магазине акция на 3 по цене 2. Твоя цель – накопить на велосипед за 1000 монет. Что делать?", 
answers:["Покупать акцию","Игнорировать акцию","Купить только то, что нужно"], 
correct:1},

{q:"Ты хочешь купить новую игру за 300, но через неделю будет скидка 50%. Сколько лучше потратить сейчас?",

correct:1},

correct:1},

{q:"У тебя 300 монет. Нужно накопить на поездку за 1000. Друг предлагает совместно купить настольную игру за 400. Что делать?", 
answers:["Купить игру и забыть про поездку","Продолжать копить","Частично участвовать"], 
correct:2},

{q:"Ты получил подарок 50 монет. Стоит ли тратить на мелочи или откладывать на цель?", 
answers:["Тратить","Откладывать","Разделить"], 
correct:1},

{q:"Ты хочешь купить сладости каждый день за 20 монет. Цель – велосипед 500 монет.", 
answers:["Покупать каждый день","Копить","Частично покупать"], 
correct:2},

{q:"Ты накопил 400 монет. Цена поездки выросла до 450. Есть скидка 10% через неделю. Как поступить?", 
answers:["Купить сейчас","Подождать скидку","Откладывать ещё и ждать скидку"], 
correct:2},

{q:"Ты хочешь купить набор для рисования за 150 монет, но копишь на планшет за 1000. Что делать?", 
answers:["Купить набор","Продолжать копить","Разделить деньги"], 
correct:1},

{q:"Ты получаешь 50 монет за неделю. Как спланировать расходы на месяц, чтобы копить на цель?", 
answers:["Тратить всё","Планировать расходы и откладывать","Игнорировать"], 
correct:1},

{q:"Ты накопил 300 монет на подарок другу. Есть шанс выиграть 200 монет в игре. Как лучше?", 
answers:["Рискнуть и участвовать","Не рисковать, копить","Играть только частично"], 
correct:1},

{q:"Ты хочешь купить сладости, но родители говорят откладывать на планшет. Как рационально поступить?", 
answers:["Сразу купить","Подождать и копить","Игнорировать родителей"], 
correct:1},

{q:"Ты получаешь бонус 100 монет раз в месяц. Как распределить между целью и мелкими покупками?", 
answers:["Тратить на себя","Откладывать всю сумму","Часть на цель, часть на себя"], 
correct:2},

{q:"Ты накопил 250 монет на велосипед. Цена велосипеда выросла на 50. Что лучше сделать?", 
answers:["Купить велосипед","Продолжать копить","Откладывать на другой велосипед"], 
correct:1},

{q:"Ты хочешь купить книгу за 120, но копишь на планшет 1000. Через месяц появится скидка на книгу. Что делать?", 
answers:["Купить сразу","Подождать скидку","Не покупать"], 
correct:1},

{q:"Ты получил 50 монет. Друг предлагает обменять игрушку на 70 монет. Цель – накопить на планшет.", 
answers:["Обменять игрушку","Продолжать копить","Разделить деньги"], 
correct:1},

{q:"Ты хочешь купить сладости на 30 монет. Есть шанс заработать 50 монет в игре. Как поступить?", 
answers:["Сразу купить","Подождать и заработать","Игнорировать"], 
correct:1},

{q:"Ты накопил 600 монет. Друзья зовут в кафе за 100. Цель – планшет 1000. Что делать?",

correct:1},

correct:1},

{q:"Ты получаешь бонус 100 монет раз в месяц. Как распределить на короткие и долгосрочные цели?", 
answers:["Тратить на короткие","Откладывать на долгосрочные","Разделить между ними"], 
correct:2},

{q:"Ты накопил 400 монет. Цена поездки выросла до 450. Есть шанс скидки 10% через неделю. Как действовать?", 
answers:["Купить сейчас","Подождать скидку","Откладывать ещё и ждать скидку"], 
correct:2},

{q:"Ты хочешь купить новый набор для рисования за 150 монет, но копишь на планшет 1000. Что делать?", 
answers:["Купить набор","Продолжать копить","Разделить деньги"], 
correct:1}
];
document.getElementById("qTotal").textContent=QUESTIONS_TOTAL

let shuffled=[...QUESTIONS].sort(()=>Math.random()-0.5)

let current=0

let playerScore=0
let bot1Score=0
let bot2Score=0

/* timer */

let time=70
let timerInterval

function startTimer(){

clearInterval(timerInterval)

time=70
document.getElementById("timer").textContent=time

timerInterval=setInterval(()=>{

time--
document.getElementById("timer").textContent=time

if(time<=0){

clearInterval(timerInterval)

current++
nextQuestion()

}

},1000)

}

/* load question */

function loadQuestion(){

if(current>=QUESTIONS_TOTAL){
endGame()
return
}

document.getElementById("qCurrent").textContent=current+1

const q=shuffled[current]

const card=document.getElementById("card")

card.classList.remove("fade-in")
card.classList.add("fade-out")

setTimeout(()=>{

document.getElementById("question").textContent=q.q

const answersBlock=document.getElementById("answers")
answersBlock.innerHTML=""

q.answers.forEach((text,i)=>{

const div=document.createElement("div")
div.className="answer"
div.textContent=text

div.onclick=()=>selectAnswer(div,i)

answersBlock.appendChild(div)

})

card.classList.remove("fade-out")
card.classList.add("fade-in")

startTimer()

},300)

}

/* answer */

function selectAnswer(el,index){

clearInterval(timerInterval)

const q=shuffled[current]
const answers=document.querySelectorAll(".answer")

answers.forEach(a=>a.onclick=null)

if(index===q.correct){

el.classList.add("correct")
playerScore+=10

correctSound.currentTime=0
correctSound.play()

}else{

el.classList.add("wrong")
answers[q.correct].classList.add("correct")

wrongSound.currentTime=0
wrongSound.play()

}

updateScores()

setTimeout(()=>{

current++
nextQuestion()

},1200)

}

function nextQuestion(){

loadQuestion()

}

/* scores */

function updateScores(){

document.getElementById("playerScore").textContent=playerScore
document.getElementById("bot1Score").textContent=bot1Score
document.getElementById("bot2Score").textContent=bot2Score

}

/* bots */

function botsTurn(){

const q=shuffled[current]

if(!q)return

const r1=Math.floor(Math.random()*3)
const r2=Math.floor(Math.random()*3)

if(r1===q.correct)bot1Score+=10
if(r2===q.correct)bot2Score+=10

updateScores()

}

setInterval(botsTurn,60000)

/* end */

function endGame(){

let winner="Ничья"

if(playerScore>bot1Score && playerScore>bot2Score)
winner="Игрок"

if(bot1Score>playerScore && bot1Score>bot2Score)
winner="Бот Дима"

if(bot2Score>playerScore && bot2Score>bot1Score)
winner="Бот Олег"

document.body.innerHTML=`

<div class="winner">

<div class="card" style="text-align:center">

<h2>Игра окончена</h2>

<br>

<h3>Победитель: ${winner}</h3>

<br>

<p>Игрок: ${playerScore}</p>
<p>Бот Алекс: ${bot1Score}</p>
<p>Бот Маша: ${bot2Score}</p>

<br>

<p style="opacity:.6">Возврат через 5 секунд...</p>

</div>

</div>

`

setTimeout(()=>{

location.reload()

},5000)

}

/* start */

document.getElementById("startBtn").onclick=()=>{

document.getElementById("startScreen").style.opacity="0"

setTimeout(()=>{
document.getElementById("startScreen").style.display="none"
loadQuestion()
},700)

}

</script>

</body>
</html>
